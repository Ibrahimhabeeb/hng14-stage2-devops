name: CI-CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint Python
        run: flake8 api worker

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint JavaScript
        working-directory: frontend
        run: npm run lint

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API test dependencies
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API unit tests with coverage
        env:
          REDIS_HOST: redis
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""
        working-directory: api
        run: |
          pytest tests -q --cov=main --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage.xml
          if-no-files-found: error

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        run: |
          echo "SHA_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "REGISTRY=localhost:5000/hng14" >> "$GITHUB_ENV"

      - name: Build images with SHA and latest tags
        run: |
          docker build -t ${REGISTRY}/api:${SHA_TAG} -t ${REGISTRY}/api:latest ./api
          docker build -t ${REGISTRY}/worker:${SHA_TAG} -t ${REGISTRY}/worker:latest ./worker
          docker build -t ${REGISTRY}/frontend:${SHA_TAG} -t ${REGISTRY}/frontend:latest ./frontend

      - name: Push images to local registry service
        run: |
          docker push ${REGISTRY}/api:${SHA_TAG}
          docker push ${REGISTRY}/api:latest
          docker push ${REGISTRY}/worker:${SHA_TAG}
          docker push ${REGISTRY}/worker:latest
          docker push ${REGISTRY}/frontend:${SHA_TAG}
          docker push ${REGISTRY}/frontend:latest

      - name: Save latest images as tar artifacts
        run: |
          docker pull ${REGISTRY}/api:latest
          docker pull ${REGISTRY}/worker:latest
          docker pull ${REGISTRY}/frontend:latest
          docker tag ${REGISTRY}/api:latest local/api:latest
          docker tag ${REGISTRY}/worker:latest local/worker:latest
          docker tag ${REGISTRY}/frontend:latest local/frontend:latest
          docker save local/api:latest -o api-image.tar
          docker save local/worker:latest -o worker-image.tar
          docker save local/frontend:latest -o frontend-image.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-images
          path: |
            api-image.tar
            worker-image.tar
            frontend-image.tar
          if-no-files-found: error

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built image artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-images

      - name: Load images
        run: |
          docker load -i api-image.tar
          docker load -i worker-image.tar
          docker load -i frontend-image.tar

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Scan API image
        run: |
          trivy image --severity CRITICAL --exit-code 1 --format sarif --output trivy-api.sarif local/api:latest

      - name: Scan worker image
        run: |
          trivy image --severity CRITICAL --exit-code 1 --format sarif --output trivy-worker.sarif local/worker:latest

      - name: Scan frontend image
        run: |
          trivy image --severity CRITICAL --exit-code 1 --format sarif --output trivy-frontend.sarif local/frontend:latest

      - name: Upload Trivy SARIF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: |
            trivy-api.sarif
            trivy-worker.sarif
            trivy-frontend.sarif
          if-no-files-found: error

  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built image artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-images

      - name: Load images
        run: |
          docker load -i api-image.tar
          docker load -i worker-image.tar
          docker load -i frontend-image.tar

      - name: Start stack
        run: |
          docker compose --env-file .env.example up -d --no-build

      - name: Wait for frontend health
        run: |
          timeout 90 bash -c 'until curl -fsS http://127.0.0.1:3000/health > /dev/null; do sleep 2; done'

      - name: Submit job and assert completion
        run: |
          JOB_ID="$(curl -sS -X POST http://127.0.0.1:3000/submit | python -c "import json,sys; print(json.load(sys.stdin)['job_id'])")"
          timeout 90 bash -c "until [ \"\$(curl -sS http://127.0.0.1:3000/status/${JOB_ID} | python -c \"import json,sys; print(json.load(sys.stdin).get('status',''))\")\" = \"completed\" ]; do sleep 2; done"
          STATUS="$(curl -sS http://127.0.0.1:3000/status/${JOB_ID} | python -c "import json,sys; print(json.load(sys.stdin).get('status',''))")"
          test "${STATUS}" = "completed"

      - name: Tear down stack
        if: always()
        run: docker compose --env-file .env.example down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built image artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-images

      - name: Load images
        run: |
          docker load -i api-image.tar
          docker load -i worker-image.tar
          docker load -i frontend-image.tar

      - name: Start baseline stack
        run: |
          docker compose --env-file .env.example up -d --no-build

      - name: Execute scripted rolling update
        run: |
          chmod +x scripts/rolling-deploy.sh
          scripts/rolling-deploy.sh frontend local/frontend:latest 13000 /health 60 job_processor_network

      - name: Cleanup deployment environment
        if: always()
        run: |
          docker rm -f frontend-active frontend-candidate || true
          docker compose --env-file .env.example down -v || true

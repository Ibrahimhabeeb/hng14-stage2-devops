name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint Python
        run: flake8 api worker

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint JavaScript
        working-directory: frontend
        run: npm run lint

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API test dependencies
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API unit tests with coverage
        env:
          REDIS_HOST: redis
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""
        working-directory: api
        run: |
          pytest tests -q --cov=main --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage.xml
          if-no-files-found: error

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        run: |
          echo "SHA_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "REGISTRY=localhost:5000/hng14" >> "$GITHUB_ENV"
          echo "DOCKERHUB_NAMESPACE=${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}" >> "$GITHUB_ENV"

      - name: Build images with SHA and latest tags
        run: |
          docker build -t ${REGISTRY}/api:${SHA_TAG} -t ${REGISTRY}/api:latest ./api
          docker build -t ${REGISTRY}/worker:${SHA_TAG} -t ${REGISTRY}/worker:latest ./worker
          docker build -t ${REGISTRY}/frontend:${SHA_TAG} -t ${REGISTRY}/frontend:latest ./frontend

      - name: Push images to local registry service
        run: |
          docker push ${REGISTRY}/api:${SHA_TAG}
          docker push ${REGISTRY}/api:latest
          docker push ${REGISTRY}/worker:${SHA_TAG}
          docker push ${REGISTRY}/worker:latest
          docker push ${REGISTRY}/frontend:${SHA_TAG}
          docker push ${REGISTRY}/frontend:latest

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Tag and push images to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        run: |
          docker tag ${REGISTRY}/api:${SHA_TAG} ${DOCKERHUB_NAMESPACE}/api:${SHA_TAG}
          docker tag ${REGISTRY}/api:latest ${DOCKERHUB_NAMESPACE}/api:latest
          docker tag ${REGISTRY}/worker:${SHA_TAG} ${DOCKERHUB_NAMESPACE}/worker:${SHA_TAG}
          docker tag ${REGISTRY}/worker:latest ${DOCKERHUB_NAMESPACE}/worker:latest
          docker tag ${REGISTRY}/frontend:${SHA_TAG} ${DOCKERHUB_NAMESPACE}/frontend:${SHA_TAG}
          docker tag ${REGISTRY}/frontend:latest ${DOCKERHUB_NAMESPACE}/frontend:latest
          docker push ${DOCKERHUB_NAMESPACE}/api:${SHA_TAG}
          docker push ${DOCKERHUB_NAMESPACE}/api:latest
          docker push ${DOCKERHUB_NAMESPACE}/worker:${SHA_TAG}
          docker push ${DOCKERHUB_NAMESPACE}/worker:latest
          docker push ${DOCKERHUB_NAMESPACE}/frontend:${SHA_TAG}
          docker push ${DOCKERHUB_NAMESPACE}/frontend:latest

      - name: Save latest images as tar artifacts
        run: |
          docker pull ${REGISTRY}/api:latest
          docker pull ${REGISTRY}/worker:latest
          docker pull ${REGISTRY}/frontend:latest
          docker tag ${REGISTRY}/api:latest local/api:latest
          docker tag ${REGISTRY}/worker:latest local/worker:latest
          docker tag ${REGISTRY}/frontend:latest local/frontend:latest
          docker save local/api:latest -o api-image.tar
          docker save local/worker:latest -o worker-image.tar
          docker save local/frontend:latest -o frontend-image.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-images
          path: |
            api-image.tar
            worker-image.tar
            frontend-image.tar
          if-no-files-found: error

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built image artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-images

      - name: Load images
        run: |
          docker load -i api-image.tar
          docker load -i worker-image.tar
          docker load -i frontend-image.tar

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Scan API image
        run: |
          trivy image --severity CRITICAL --exit-code 1 --format sarif --output trivy-api.sarif local/api:latest

      - name: Scan worker image
        run: |
          trivy image --severity CRITICAL --exit-code 1 --format sarif --output trivy-worker.sarif local/worker:latest

      - name: Scan frontend image
        run: |
          trivy image --severity CRITICAL --exit-code 1 --format sarif --output trivy-frontend.sarif local/frontend:latest

      - name: Upload Trivy SARIF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: |
            trivy-api.sarif
            trivy-worker.sarif
            trivy-frontend.sarif
          if-no-files-found: error

  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built image artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-images

      - name: Load images
        run: |
          docker load -i api-image.tar
          docker load -i worker-image.tar
          docker load -i frontend-image.tar

      - name: Build CI env file from GitHub vars/secrets
        env:
          REDIS_IMAGE: ${{ vars.REDIS_IMAGE || 'redis:7-alpine' }}
          REDIS_HOST: ${{ vars.REDIS_HOST || 'redis' }}
          REDIS_PORT: ${{ vars.REDIS_PORT || '6379' }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD || '' }}
          API_IMAGE: ${{ vars.API_IMAGE || 'local/api:latest' }}
          WORKER_IMAGE: ${{ vars.WORKER_IMAGE || 'local/worker:latest' }}
          FRONTEND_IMAGE: ${{ vars.FRONTEND_IMAGE || 'local/frontend:latest' }}
          API_HOST_PORT: ${{ vars.API_HOST_PORT || '8000' }}
          API_CONTAINER_PORT: ${{ vars.API_CONTAINER_PORT || '8000' }}
          FRONTEND_HOST_PORT: ${{ vars.FRONTEND_HOST_PORT || '3000' }}
          FRONTEND_CONTAINER_PORT: ${{ vars.FRONTEND_CONTAINER_PORT || '3000' }}
          API_URL: ${{ vars.API_URL || 'http://api:8000' }}
          FRONTEND_HOST: ${{ vars.FRONTEND_HOST || '0.0.0.0' }}
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT || '3000' }}
          COMPOSE_NETWORK_NAME: ${{ vars.COMPOSE_NETWORK_NAME || 'job_processor_network' }}
          REDIS_CPUS: ${{ vars.REDIS_CPUS || '0.50' }}
          REDIS_MEM_LIMIT: ${{ vars.REDIS_MEM_LIMIT || '256m' }}
          API_CPUS: ${{ vars.API_CPUS || '0.50' }}
          API_MEM_LIMIT: ${{ vars.API_MEM_LIMIT || '256m' }}
          WORKER_CPUS: ${{ vars.WORKER_CPUS || '0.50' }}
          WORKER_MEM_LIMIT: ${{ vars.WORKER_MEM_LIMIT || '256m' }}
          FRONTEND_CPUS: ${{ vars.FRONTEND_CPUS || '0.50' }}
          FRONTEND_MEM_LIMIT: ${{ vars.FRONTEND_MEM_LIMIT || '256m' }}
        run: |
          cat > .env.ci <<EOF
          REDIS_IMAGE=${REDIS_IMAGE}
          REDIS_HOST=${REDIS_HOST}
          REDIS_PORT=${REDIS_PORT}
          REDIS_PASSWORD=${REDIS_PASSWORD}
          API_IMAGE=${API_IMAGE}
          WORKER_IMAGE=${WORKER_IMAGE}
          FRONTEND_IMAGE=${FRONTEND_IMAGE}
          API_HOST_PORT=${API_HOST_PORT}
          API_CONTAINER_PORT=${API_CONTAINER_PORT}
          FRONTEND_HOST_PORT=${FRONTEND_HOST_PORT}
          FRONTEND_CONTAINER_PORT=${FRONTEND_CONTAINER_PORT}
          API_URL=${API_URL}
          FRONTEND_HOST=${FRONTEND_HOST}
          FRONTEND_PORT=${FRONTEND_PORT}
          COMPOSE_NETWORK_NAME=${COMPOSE_NETWORK_NAME}
          REDIS_CPUS=${REDIS_CPUS}
          REDIS_MEM_LIMIT=${REDIS_MEM_LIMIT}
          API_CPUS=${API_CPUS}
          API_MEM_LIMIT=${API_MEM_LIMIT}
          WORKER_CPUS=${WORKER_CPUS}
          WORKER_MEM_LIMIT=${WORKER_MEM_LIMIT}
          FRONTEND_CPUS=${FRONTEND_CPUS}
          FRONTEND_MEM_LIMIT=${FRONTEND_MEM_LIMIT}
          EOF

      - name: Start stack
        run: |
          docker compose --env-file .env.ci up -d --no-build

      - name: Wait for frontend health
        run: |
          timeout 90 bash -c 'until curl -fsS http://127.0.0.1:3000/health > /dev/null; do sleep 2; done'

      - name: Submit job and assert completion
        run: |
          JOB_ID="$(curl -sS -X POST http://127.0.0.1:3000/submit | python -c "import json,sys; print(json.load(sys.stdin)['job_id'])")"
          timeout 90 bash -c "until [ \"\$(curl -sS http://127.0.0.1:3000/status/${JOB_ID} | python -c \"import json,sys; print(json.load(sys.stdin).get('status',''))\")\" = \"completed\" ]; do sleep 2; done"
          STATUS="$(curl -sS http://127.0.0.1:3000/status/${JOB_ID} | python -c "import json,sys; print(json.load(sys.stdin).get('status',''))")"
          test "${STATUS}" = "completed"

      - name: Tear down stack
        if: always()
        run: |
          docker compose --env-file .env.ci down -v
          rm -f .env.ci
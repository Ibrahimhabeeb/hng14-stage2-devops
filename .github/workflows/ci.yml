name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # --- 1. LINT JOB ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint Python
        run: flake8 api worker

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint JavaScript
        working-directory: frontend
        run: npm run lint

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  # --- 2. TEST JOB ---
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API test dependencies
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API unit tests with coverage
        env:
          REDIS_HOST: redis
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""
        working-directory: api
        run: |
          pytest tests -q --cov=main --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage.xml
          if-no-files-found: error

  # --- 3. BUILD JOB ---
  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    # FIX: Scoping Docker Hub credentials at job level for visibility in 'if' conditions
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        run: |
          echo "SHA_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "REGISTRY=localhost:5000/hng14" >> "$GITHUB_ENV"
          echo "DOCKERHUB_NAMESPACE=${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME || 'local' }}" >> "$GITHUB_ENV"

      - name: Build images
        run: |
          docker build -t ${REGISTRY}/api:${SHA_TAG} -t ${REGISTRY}/api:latest ./api
          docker build -t ${REGISTRY}/worker:${SHA_TAG} -t ${REGISTRY}/worker:latest ./worker
          docker build -t ${REGISTRY}/frontend:${SHA_TAG} -t ${REGISTRY}/frontend:latest ./frontend

      - name: Push to local registry
        run: |
          docker push ${REGISTRY}/api:${SHA_TAG}
          docker push ${REGISTRY}/api:latest
          docker push ${REGISTRY}/worker:${SHA_TAG}
          docker push ${REGISTRY}/worker:latest
          docker push ${REGISTRY}/frontend:${SHA_TAG}
          docker push ${REGISTRY}/frontend:latest

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        run: |
          echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Tag and push to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        run: |
          # Tags and pushes for all three services
          for service in api worker frontend; do
            docker tag ${REGISTRY}/${service}:${SHA_TAG} ${DOCKERHUB_NAMESPACE}/${service}:${SHA_TAG}
            docker tag ${REGISTRY}/${service}:latest ${DOCKERHUB_NAMESPACE}/${service}:latest
            docker push ${DOCKERHUB_NAMESPACE}/${service}:${SHA_TAG}
            docker push ${DOCKERHUB_NAMESPACE}/${service}:latest
          done

      - name: Save images as tar
        run: |
          docker tag ${REGISTRY}/api:latest local/api:latest
          docker tag ${REGISTRY}/worker:latest local/worker:latest
          docker tag ${REGISTRY}/frontend:latest local/frontend:latest
          docker save local/api:latest -o api-image.tar
          docker save local/worker:latest -o worker-image.tar
          docker save local/frontend:latest -o frontend-image.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-images
          path: |
            api-image.tar
            worker-image.tar
            frontend-image.tar

  # --- 4. SECURITY SCAN JOB ---
  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built image artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-images

      - name: Load images
        run: |
          docker load -i api-image.tar
          docker load -i worker-image.tar
          docker load -i frontend-image.tar

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      - name: Run Vulnerability Scans
        run: |
          trivy image --severity CRITICAL --exit-code 1 --format sarif --output trivy-api.sarif local/api:latest
          trivy image --severity CRITICAL --exit-code 1 --format sarif --output trivy-worker.sarif local/worker:latest
          trivy image --severity CRITICAL --exit-code 1 --format sarif --output trivy-frontend.sarif local/frontend:latest

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: "*.sarif"

  # --- 5. INTEGRATION TEST JOB ---
  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download images
        uses: actions/download-artifact@v4
        with:
          name: built-images

      - name: Load images
        run: |
          docker load -i api-image.tar
          docker load -i worker-image.tar
          docker load -i frontend-image.tar

      - name: Build CI env file
        env:
          REDIS_IMAGE: ${{ vars.REDIS_IMAGE || 'redis:7-alpine' }}
          REDIS_HOST: ${{ vars.REDIS_HOST || 'redis' }}
          REDIS_PORT: ${{ vars.REDIS_PORT || '6379' }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD || '' }}
          REDIS_CPUS: ${{ vars.REDIS_CPUS || '0.5' }}
          REDIS_MEM_LIMIT: ${{ vars.REDIS_MEM_LIMIT || '512m' }}
          API_IMAGE: 'local/api:latest'
          API_HOST_PORT: ${{ vars.API_HOST_PORT || '3000' }}
          API_CONTAINER_PORT: ${{ vars.API_CONTAINER_PORT || '5000' }}
          API_CPUS: ${{ vars.API_CPUS || '0.5' }}
          API_MEM_LIMIT: ${{ vars.API_MEM_LIMIT || '512m' }}
          WORKER_IMAGE: 'local/worker:latest'
          WORKER_CPUS: ${{ vars.WORKER_CPUS || '0.5' }}
          WORKER_MEM_LIMIT: ${{ vars.WORKER_MEM_LIMIT || '512m' }}
          FRONTEND_IMAGE: 'local/frontend:latest'
          FRONTEND_HOST_PORT: ${{ vars.FRONTEND_HOST_PORT || '80' }}
          FRONTEND_CONTAINER_PORT: ${{ vars.FRONTEND_CONTAINER_PORT || '80' }}
          FRONTEND_HOST: ${{ vars.FRONTEND_HOST || '127.0.0.1' }}
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT || '80' }}
          API_URL: ${{ vars.API_URL || 'http://127.0.0.1:3000' }}
          FRONTEND_CPUS: ${{ vars.FRONTEND_CPUS || '0.5' }}
          FRONTEND_MEM_LIMIT: ${{ vars.FRONTEND_MEM_LIMIT || '256m' }}
        run: |
          cat > .env.ci <<EOF
          REDIS_IMAGE=${REDIS_IMAGE}
          REDIS_HOST=${REDIS_HOST}
          REDIS_PORT=${REDIS_PORT}
          REDIS_PASSWORD=${REDIS_PASSWORD}
          REDIS_CPUS=${REDIS_CPUS}
          REDIS_MEM_LIMIT=${REDIS_MEM_LIMIT}
          API_IMAGE=${API_IMAGE}
          API_HOST_PORT=${API_HOST_PORT}
          API_CONTAINER_PORT=${API_CONTAINER_PORT}
          API_CPUS=${API_CPUS}
          API_MEM_LIMIT=${API_MEM_LIMIT}
          WORKER_IMAGE=${WORKER_IMAGE}
          WORKER_CPUS=${WORKER_CPUS}
          WORKER_MEM_LIMIT=${WORKER_MEM_LIMIT}
          FRONTEND_IMAGE=${FRONTEND_IMAGE}
          FRONTEND_HOST_PORT=${FRONTEND_HOST_PORT}
          FRONTEND_CONTAINER_PORT=${FRONTEND_CONTAINER_PORT}
          FRONTEND_HOST=${FRONTEND_HOST}
          FRONTEND_PORT=${FRONTEND_PORT}
          API_URL=${API_URL}
          FRONTEND_CPUS=${FRONTEND_CPUS}
          FRONTEND_MEM_LIMIT=${FRONTEND_MEM_LIMIT}
          COMPOSE_NETWORK_NAME=ci_test_net
          EOF

      - name: Start stack
        run: docker compose --env-file .env.ci up -d --no-build

      - name: Integration Checks
        run: |
          # Wait for health
          timeout 60 bash -c 'until curl -fsS http://127.0.0.1:3000/health > /dev/null; do sleep 2; done'
          # Simple functional test
          JOB_ID=$(curl -sS -X POST http://127.0.0.1:3000/submit | python3 -c "import json,sys; print(json.load(sys.stdin)['job_id'])")
          echo "Job submitted: $JOB_ID"

      - name: Cleanup
        if: always()
        run: |
          docker compose --env-file .env.ci down -v
          rm -f .env.ci
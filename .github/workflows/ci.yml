name : CI Pipeline
on:
  push:
    branches:
      - main
    workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint Python
        run: flake8 api worker

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      
      - name: Lint JavaScript
        working-directory: frontend
        run: npm run lint

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
        
      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
    
      - name: Install API test dependencies
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run API unit tests with coverage
        env:
          REDIS_HOST: redis
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""
        working-directory: api
        run: |
          pytest tests -q --cov=main --cov-report=xml:coverage.xml --cov-report=term-missing


      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage.xml
          if-no-files-found: error
      